name: ollama-gateway-client

services:
  nginx-proxy:
    image: nginx:latest
    container_name: ollama-gateway-client
    ports:
      - "11434:11434"
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' > /etc/nginx/nginx.conf
        events {}

        http {
            server {
                listen 11434;

                location / {
                    proxy_pass https://202.137.172.189:11434;

                    proxy_ssl_server_name on;
                    proxy_ssl_verify off;

                    proxy_set_header Host 202.137.172.189;
                    proxy_set_header Authorization "Bearer abdefghij";

                    proxy_http_version 1.1;
                    proxy_set_header Connection "";
                }
            }
        }
        EOF
        exec nginx -g 'daemon off;'
    restart: unless-stopped